spring:
  application:
    name: search-and-return
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:openai/gpt-5-mini}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:qwen/qwen3-embedding-8b}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  embedding:
    model-name: ${EMBEDDING_MODEL_NAME:qwen/qwen3-embedding-8b}
    top-k: ${QA_TOP_K:8}
    router:
      mode: ${EMBEDDING_ROUTER_MODE:default}
      canary-percent: ${EMBEDDING_ROUTER_CANARY_PERCENT:0}
      forced-profile: ${EMBEDDING_ROUTER_FORCED_PROFILE:}
      quantized-rerank-multiplier: ${EMBEDDING_ROUTER_QUANTIZED_RERANK_MULTIPLIER:8}
  retrieval:
    phase2:
      keyword-topk: ${QA_KEYWORD_TOP_K:20}
      final-topn: ${QA_FINAL_TOP_N:8}
      fts-language: ${QA_FTS_LANGUAGE:simple}
      score-normalization:
        enabled: ${QA_SCORE_NORMALIZATION_ENABLED:true}
      weights:
        vector: ${QA_WEIGHT_VECTOR:0.55}
        keyword: ${QA_WEIGHT_KEYWORD:0.25}
        title: ${QA_WEIGHT_TITLE:0.10}
        tag: ${QA_WEIGHT_TAG:0.10}
    phase3:
      reject:
        min-top1-score: ${QA_REJECT_MIN_TOP1_SCORE:0.55}
        min-top1-score-vector-only: ${QA_REJECT_MIN_TOP1_SCORE_VECTOR_ONLY:0.72}
        min-top-gap: ${QA_REJECT_MIN_TOP_GAP:0.08}
        min-confident-score: ${QA_REJECT_MIN_CONFIDENT_SCORE:0.70}
        min-evidence-count: ${QA_REJECT_MIN_EVIDENCE_COUNT:2}
    rewrite:
      max-attempts: ${QA_REWRITE_MAX_ATTEMPTS:3}
      max-candidate-queries: ${QA_REWRITE_MAX_CANDIDATE_QUERIES:3}
      max-query-length: ${QA_REWRITE_MAX_QUERY_LENGTH:120}
    chat:
      context-turns: ${QA_CHAT_CONTEXT_TURNS:6}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
