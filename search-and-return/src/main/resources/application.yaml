spring:
  application:
    name: search-and-return
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://localhost:3000/v1}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:openai/gpt-5-mini}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:openai/text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: ${SPRING_AI_PGVECTOR_INIT_SCHEMA:false}
        table-name: ${SPRING_AI_PGVECTOR_TABLE:rag_law_chunk_store}
        schema-name: ${SPRING_AI_PGVECTOR_SCHEMA:indexing}
        id-type: ${SPRING_AI_PGVECTOR_ID_TYPE:TEXT}
        dimensions: ${EMBEDDING_MODEL_DIMENSION:1536}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  embedding:
    model-name: ${EMBEDDING_MODEL_NAME:openai/text-embedding-3-small}
    top-k: ${QA_TOP_K:8}
  retrieval:
    phase2:
      keyword-topk: ${QA_KEYWORD_TOP_K:20}
      final-topn: ${QA_FINAL_TOP_N:8}
      fts-language: ${QA_FTS_LANGUAGE:simple}
      score-normalization:
        enabled: ${QA_SCORE_NORMALIZATION_ENABLED:true}
      weights:
        vector: ${QA_WEIGHT_VECTOR:0.55}
        keyword: ${QA_WEIGHT_KEYWORD:0.25}
        title: ${QA_WEIGHT_TITLE:0.10}
        tag: ${QA_WEIGHT_TAG:0.10}
    phase3:
      reject:
        min-top1-score: ${QA_REJECT_MIN_TOP1_SCORE:0.55}
        min-top1-score-vector-only: ${QA_REJECT_MIN_TOP1_SCORE_VECTOR_ONLY:0.72}
        min-top-gap: ${QA_REJECT_MIN_TOP_GAP:0.08}
        min-confident-score: ${QA_REJECT_MIN_CONFIDENT_SCORE:0.70}
        min-evidence-count: ${QA_REJECT_MIN_EVIDENCE_COUNT:2}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
