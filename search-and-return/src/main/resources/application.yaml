spring:
  application:
    name: search-and-return
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  embedding:
    model-name: ${EMBEDDING_MODEL_NAME:text-embedding-3-small}
    top-k: ${QA_TOP_K:8}
