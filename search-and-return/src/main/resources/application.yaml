spring:
  application:
    name: search-and-return
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  embedding:
    model-name: ${EMBEDDING_MODEL_NAME:text-embedding-3-small}
    top-k: ${QA_TOP_K:8}
