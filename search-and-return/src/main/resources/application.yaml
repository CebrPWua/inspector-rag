spring:
  application:
    name: search-and-return
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${ONEAPI_BASE_URL:http://localhost:3000/v1}
      api-key: ${ONEAPI_API_KEY:sk-hhxCWxLpjzIiOBoM58929361AcA94bEaA00a097dAb87455a}
      chat:
        options:
          model: ${ONEAPI_CHAT_MODEL:openai/gpt-5-mini}
      embedding:
        options:
          model: ${EMBEDDING_MODEL_NAME:openai/text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: ${SPRING_AI_PGVECTOR_INIT_SCHEMA:false}
        table-name: ${SPRING_AI_PGVECTOR_TABLE:rag_law_chunk_store}
        id-type: ${SPRING_AI_PGVECTOR_ID_TYPE:TEXT}
        dimensions: ${EMBEDDING_MODEL_DIMENSION:1536}

server:
  port: ${SERVER_PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  persistence:
    mode: ${PERSISTENCE_MODE:jdbc}
  ai:
    provider: ${AI_PROVIDER:mock}
    oneapi:
      base-url: ${ONEAPI_BASE_URL:http://localhost:3000/v1}
      api-key: ${ONEAPI_API_KEY:sk-hhxCWxLpjzIiOBoM58929361AcA94bEaA00a097dAb87455a}
      chat-model: ${ONEAPI_CHAT_MODEL:openai/gpt-5-mini}
  embedding:
    model-name: ${EMBEDDING_MODEL_NAME:openai/text-embedding-3-small}
    top-k: ${QA_TOP_K:8}
  retrieval:
    provider: ${RETRIEVAL_PROVIDER:jdbc}
    phase2:
      keyword-topk: ${QA_KEYWORD_TOP_K:20}
      final-topn: ${QA_FINAL_TOP_N:8}
      fts-language: ${QA_FTS_LANGUAGE:simple}
      weights:
        vector: ${QA_WEIGHT_VECTOR:0.55}
        keyword: ${QA_WEIGHT_KEYWORD:0.25}
        title: ${QA_WEIGHT_TITLE:0.10}
        tag: ${QA_WEIGHT_TAG:0.10}
    phase3:
      reject:
        min-top1-score: ${QA_REJECT_MIN_TOP1_SCORE:0.55}
        min-top-gap: ${QA_REJECT_MIN_TOP_GAP:0.08}
        min-confident-score: ${QA_REJECT_MIN_CONFIDENT_SCORE:0.70}
        min-evidence-count: ${QA_REJECT_MIN_EVIDENCE_COUNT:2}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
