spring:
  application:
    name: embedding
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:qwen/qwen3-embedding-8b}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
