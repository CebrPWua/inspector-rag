spring:
  application:
    name: embedding
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:http://localhost:3000/v1}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:openai/text-embedding-3-small}
    vectorstore:
      pgvector:
        initialize-schema: ${SPRING_AI_PGVECTOR_INIT_SCHEMA:false}
        table-name: ${SPRING_AI_PGVECTOR_TABLE:rag_law_chunk_store}
        id-type: ${SPRING_AI_PGVECTOR_ID_TYPE:TEXT}
        dimensions: ${EMBEDDING_MODEL_DIMENSION:1536}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  embedding:
    provider: ${EMBEDDING_PROVIDER:springai}
    model-name: ${EMBEDDING_MODEL_NAME:openai/text-embedding-3-small}
    model-version: ${EMBEDDING_MODEL_VERSION:v1}
    dimension: ${EMBEDDING_MODEL_DIMENSION:1536}
    vector-store-sync-enabled: ${VECTOR_STORE_SYNC_ENABLED:false}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
