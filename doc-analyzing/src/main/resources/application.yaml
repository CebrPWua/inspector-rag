spring:
  application:
    name: doc-analyzing
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  storage:
    mode: ${STORAGE_MODE:local}
    rustfs:
      endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
      access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
      secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
      bucket: ${RUSTFS_BUCKET:inspector-rag}
  parsing:
    docling:
      enabled: ${DOCLING_ENABLED:false}
      base-url: ${DOCLING_BASE_URL:http://localhost:5001}
      extract-path: ${DOCLING_EXTRACT_PATH:/api/extract}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
