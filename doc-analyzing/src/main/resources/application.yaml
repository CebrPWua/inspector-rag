spring:
  application:
    name: doc-analyzing
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
