spring:
  application:
    name: task-scheduling
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  persistence:
    mode: ${PERSISTENCE_MODE:jdbc}
  task:
    claim-limit: ${TASK_CLAIM_LIMIT:10}
    worker-enabled: ${TASK_WORKER_ENABLED:true}
  internal-services:
    doc-analyzing-base-url: ${DOC_ANALYZING_BASE_URL:http://localhost:8082}
    embedding-base-url: ${EMBEDDING_BASE_URL:http://localhost:8083}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
