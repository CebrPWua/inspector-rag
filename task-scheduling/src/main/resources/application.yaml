spring:
  application:
    name: task-scheduling
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8086}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  task:
    claim-limit: ${TASK_CLAIM_LIMIT:10}
    worker-enabled: ${TASK_WORKER_ENABLED:true}
  internal-services:
    doc-analyzing-base-url: ${DOC_ANALYZING_BASE_URL:http://localhost:8082}
    embedding-base-url: ${EMBEDDING_BASE_URL:http://localhost:8083}
