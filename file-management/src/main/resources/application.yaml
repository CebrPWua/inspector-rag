spring:
  application:
    name: file-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  storage:
    root-dir: ${STORAGE_ROOT_DIR:/tmp/inspector-rag-storage}
