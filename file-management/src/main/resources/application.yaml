spring:
  application:
    name: file-management
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  storage:
    mode: ${STORAGE_MODE:local}
    root-dir: ${STORAGE_ROOT_DIR:/tmp/inspector-rag-storage}
    rustfs:
      endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
      access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
      secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
      bucket: ${RUSTFS_BUCKET:inspector-rag}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
