spring:
  application:
    name: file-management
  datasource:
    url: jdbc:postgresql://localhost:5432/inspector_rag
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  storage:
    root-dir: ${STORAGE_ROOT_DIR:/tmp/inspector-rag-storage}
