spring:
  application:
    name: file-management
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1025MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inspector_rag}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info

inspector:
  storage:
    mode: ${STORAGE_MODE:rustfs}
    root-dir: ${STORAGE_ROOT_DIR:/tmp/inspector-rag-storage}
    rustfs:
      endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
      access-key: ${RUSTFS_ACCESS_KEY:}
      secret-key: ${RUSTFS_SECRET_KEY:}
      bucket: ${RUSTFS_BUCKET:inspector-rag}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
